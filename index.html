<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Ramais Canaoeste</title>

  <link rel="stylesheet" href="style.css" />

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-database-compat.js"></script>
</head>

<body>
  <header class="topo">
    <div class="logo-area">
      <img src="logocanaoeste.png" alt="Canaoeste" class="logo" />
    </div>
  </header>

  <div class="faixa-verde"></div>

  <main class="container">
    <section class="cabecalho-pagina">
      <div>
        <h1>Lista de Ramais</h1>
        <p>Consulte, edite e organize os ramais da empresa.</p>
        <p class="ultima-atualizacao" id="ultimaAtualizacao">
          Última atualização: carregando...
        </p>
      </div>

      <button class="btn-principal" id="btnAdicionarCategoria">
        + Nova categoria
      </button>
    </section>

    <section class="barra-filtros">
      <input 
        type="text" 
        id="campoBusca" 
        placeholder="Pesquisar por nome, ramal, setor ou função..."
      />

      <button class="btn-secundario" id="btnExpandirTudo">
        Expandir tudo
      </button>

      <button class="btn-secundario" id="btnRecolherTudo">
        Recolher tudo
      </button>
    </section>

    <section id="areaRamais" class="area-ramais">
      <p class="carregando">Carregando ramais...</p>
    </section>
  </main>

  <!-- Modal Categoria -->
  <div class="modal" id="modalCategoria">
    <div class="modal-conteudo">
      <h2>Nova categoria</h2>

      <label>Nome da categoria</label>
      <input type="text" id="nomeNovaCategoria" placeholder="Ex: Financeiro" />

      <div class="modal-acoes">
        <button class="btn-secundario" id="btnCancelarCategoria">Cancelar</button>
        <button class="btn-principal" id="btnSalvarCategoria">Salvar</button>
      </div>
    </div>
  </div>

  <!-- Modal Pessoa -->
  <div class="modal" id="modalPessoa">
    <div class="modal-conteudo modal-maior">
      <h2 id="tituloModalPessoa">Adicionar ramal</h2>

      <input type="hidden" id="categoriaAtual" />
      <input type="hidden" id="pessoaIdAtual" />

      <div class="grid-form">
        <div>
          <label>Nome</label>
          <input type="text" id="campoNome" placeholder="Nome da pessoa" />
        </div>

        <div>
          <label>Ramal</label>
          <input type="text" id="campoRamal" placeholder="Ex: 1000" />
        </div>

        <div>
          <label>Função / Cargo</label>
          <input type="text" id="campoCargo" placeholder="Ex: Gestor Operacional" />
        </div>

        <div>
          <label>Categoria</label>
          <input type="text" id="campoCategoriaTexto" disabled />
        </div>

        <div>
          <label>Tipo</label>
          <select id="campoTipo">
            <option value="Fone">Fone</option>
            <option value="Móvel">Móvel</option>
            <option value="PC">PC</option>
            <option value="Ramal">Ramal</option>
            <option value="Outro">Outro</option>
          </select>
        </div>

        <div>
          <label>Observação</label>
          <input type="text" id="campoObservacao" placeholder="Opcional" />
        </div>
      </div>

      <div class="modal-acoes">
        <button class="btn-secundario" id="btnCancelarPessoa">Cancelar</button>
        <button class="btn-principal" id="btnSalvarPessoa">Salvar</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
